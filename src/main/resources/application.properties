spring.application.name=skill-matching-platform

# ============================================================
# LOCAL DEVELOPMENT — MySQL
# Make sure MySQL is running and create the DB first:
#   CREATE DATABASE skillmatch;
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/skillmatch?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# RENDER DEPLOYMENT — switch to PostgreSQL
# 1. Add postgresql dependency in pom.xml (already there, just remove <scope>runtime</scope> from mysql or comment it out)
# 2. Comment out the MySQL block above and uncomment below:
#
# spring.datasource.url=${DATABASE_URL}
# spring.datasource.username=${DB_USER}
# spring.datasource.password=${DB_PASS}
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# ============================================================

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Connection pool
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=${PORT:8080}
